<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBC Account Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rbc-blue: #003168;
    --rbc-blue-light: #0051a5;
    --rbc-gold: #f4b223;
    --rbc-gold-soft: #fef3d0;
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --user-bubble: #003168;
    --bot-bubble: #ffffff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .chat-container {
    width: 100%;
    max-width: 520px;
    height: 92vh;
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* Header */
  .chat-header {
    background: var(--rbc-blue);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 44px;
    height: 44px;
    background: var(--rbc-gold);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 18px;
    color: var(--rbc-blue);
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 12.5px;
    color: rgba(255,255,255,0.65);
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #34d399;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages Area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar {
    width: 4px;
  }

  .messages::-webkit-scrollbar-thumb {
    background: #d1d5db;
    border-radius: 4px;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
  }

  .message.bot {
    align-self: flex-start;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.55;
    letter-spacing: -0.1px;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 6px;
  }

  .message.bot .bubble {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }

  .message .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
    padding: 0 4px;
  }

  .message.user .meta {
    text-align: right;
  }

  /* Sources */
  .sources {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .source-tag {
    font-size: 11px;
    padding: 4px 10px;
    background: var(--rbc-gold-soft);
    color: var(--rbc-blue);
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: -0.1px;
  }

  /* Escalation banner */
  .escalation-banner {
    margin-top: 10px;
    padding: 12px 14px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 12px;
    font-size: 13px;
    color: #991b1b;
    line-height: 1.5;
  }

  .escalation-banner strong {
    display: block;
    margin-bottom: 4px;
  }

  .escalation-banner a {
    color: var(--rbc-blue-light);
    text-decoration: underline;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 6px;
    align-self: flex-start;
    max-width: 80px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: #9ca3af;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Quick Actions */
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .quick-actions::-webkit-scrollbar { display: none; }

  .quick-btn {
    white-space: nowrap;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--rbc-blue);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .quick-btn:hover {
    background: var(--rbc-blue);
    color: #fff;
    border-color: var(--rbc-blue);
  }

  /* Input Area */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--card);
  }

  .input-area input {
    flex: 1;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-size: 14.5px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text);
    background: var(--bg);
  }

  .input-area input:focus {
    border-color: var(--rbc-blue);
  }

  .input-area input::placeholder {
    color: #9ca3af;
  }

  .send-btn {
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 14px;
    background: var(--rbc-blue);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: var(--rbc-blue-light);
    transform: scale(1.04);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn svg {
    width: 20px;
    height: 20px;
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 20px 10px;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    background: var(--rbc-gold-soft);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 26px;
  }

  .welcome h2 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .welcome p {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="header-icon">RBC</div>
    <div class="header-text">
      <h1>RBC Account Assistant</h1>
      <p>Ask about accounts, savings, TFSAs & more</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">🏦</div>
      <h2>Welcome to RBC Assist</h2>
      <p>I can help you with chequing & savings accounts, TFSAs, RRSPs, credit cards, and more. Ask me anything!</p>
    </div>
  </div>

  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" onclick="sendQuick('What chequing accounts does RBC offer?')">Chequing Accounts</button>
    <button class="quick-btn" onclick="sendQuick('Tell me about RBC TFSA')">TFSA</button>
    <button class="quick-btn" onclick="sendQuick('What savings accounts are available?')">Savings</button>
    <button class="quick-btn" onclick="sendQuick('How does NOMI Find & Save work?')">NOMI</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask about RBC accounts..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:8000';
  const SESSION_ID = 'session-' + Math.random().toString(36).substr(2, 9);
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const quickActions = document.getElementById('quickActions');

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
  }

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(content, type, sources = [], escalate = false) {
    const msg = document.createElement('div');
    msg.className = `message ${type}`;

    let html = `<div class="bubble">${content}</div>`;
    html += `<div class="meta">${getTime()}</div>`;

    if (type === 'bot' && sources.length > 0) {
      html += '<div class="sources">';
      const seen = new Set();
      sources.forEach(s => {
        const name = s.metadata?.source || 'Unknown';
        if (!seen.has(name)) {
          seen.add(name);
          html += `<span class="source-tag">${name.replace('.txt', '')}</span>`;
        }
      });
      html += '</div>';
    }

    if (type === 'bot' && escalate) {
      html += `
        <div class="escalation-banner">
          <strong>⚠️ This may need human support</strong>
          Call <a href="tel:1-800-769-2511">1-800-769-2511</a> or visit 
          <a href="https://www.rbc.com/contact-us.html" target="_blank">RBC Contact</a>
        </div>`;
    }

    msg.innerHTML = html;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typingIndicator';
    typing.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    quickActions.style.display = 'none';

    addMessage(text, 'user');
    showTyping();

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, message: text })
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json();
        addMessage('Sorry, something went wrong. Please try again.', 'bot');
        console.error(err);
        return;
      }

      const data = await res.json();
      addMessage(data.response, 'bot', data.sources || [], data.escalate || false);

    } catch (err) {
      hideTyping();
      addMessage('Unable to connect to the server. Make sure the API is running.', 'bot');
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
